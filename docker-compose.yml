services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omniclaw-postgres
    environment:
      POSTGRES_USER: omniclaw
      POSTGRES_PASSWORD: omniclaw
      POSTGRES_DB: omniclaw
    ports:
      - "${OMNICLAW_POSTGRES_PORT:-5432}:5432"
    volumes:
      - omniclaw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniclaw -d omniclaw"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  omniclaw_postgres_data:
